<section class="equation-card">
  <h3>{{ title }}</h3>

  <div class="meta-label-row">
    <span>First Term</span>
    <span>Second Term</span>
    <span>Equals</span>
    <span>Constant</span>
  </div>

  <app-position-controls
    [positions]="positions"
    (positionsChange)="onPositionsChange($event)">
  </app-position-controls>

  <div
    class="frame-row"
    cdkDropList
    [cdkDropListData]="orderedFrames"
    cdkDropListOrientation="horizontal"
    (cdkDropListDropped)="onFrameDrop($event)">
    <ng-container *ngFor="let frame of orderedFrames">
      <div class="frame-slot" cdkDrag>
        <div class="drag-handle" cdkDragHandle title="Drag to reorder">⋮⋮</div>

        <app-term-input
          *ngIf="frame.key === 'term1'"
          [variable]="variable1"
          (termChange)="onTerm1Change($event)">
        </app-term-input>

        <app-term-input
          *ngIf="frame.key === 'term2'"
          [variable]="variable2"
          (termChange)="onTerm2Change($event)">
        </app-term-input>

        <div *ngIf="frame.key === 'equals'" class="equals-frame">
          <div class="equals-symbol">{{ equalsDisplay }}</div>
        </div>

        <app-term-input
          *ngIf="frame.key === 'constant'"
          (termChange)="onConstantChange($event)">
        </app-term-input>
      </div>
    </ng-container>
  </div>

  <div class="preview-section">
    <app-equation-preview [equation]="equationLatex"></app-equation-preview>
  </div>
</section>
