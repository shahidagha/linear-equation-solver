<div class="position-layout">
  <div class="position-col" *ngFor="let control of controls">
    <div class="position-label">{{ control.label }}</div>
    <div class="pill-row">
      <button
        *ngFor="let option of options"
        type="button"
        class="pill-btn"
        [class.active]="positions[control.key] === option"
        (click)="setPosition(control.key, option)">
        {{ option }}
      </button>
    </div>
  </div>
</div>
