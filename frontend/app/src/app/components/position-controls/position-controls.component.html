<div class="position-layout" role="group" aria-label="Frame position controls">
  <div class="position-col" *ngFor="let control of controls">
    <div class="pill-row">
      <button
        *ngFor="let option of options"
        type="button"
        class="pill-btn"
        [class.active]="positions[control] === option"
        (click)="setPosition(control, option)">
        {{ option }}
      </button>
    </div>
  </div>
</div>
