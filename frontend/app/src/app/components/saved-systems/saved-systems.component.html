<div class="saved-list">
  <div *ngFor="let sys of systems" class="system-card">
    <div class="equation">{{ buildEquation(sys.equation1, sys.variables) }}</div>
    <div class="equation">{{ buildEquation(sys.equation2, sys.variables) }}</div>

    <button type="button" (click)="showSolution(sys)">Use System</button>
  </div>

  <div *ngIf="systems.length === 0" class="empty-state">No systems saved yet.</div>
</div>
