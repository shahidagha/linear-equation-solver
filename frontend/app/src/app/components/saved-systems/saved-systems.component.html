<div class="saved-list panel-card">
  <h3>Saved Systems</h3>

  <div class="top-row">
    <input type="text" class="search-input" placeholder="Search systems..." [(ngModel)]="searchTerm">
    <select [(ngModel)]="pageSize"><option [ngValue]="5">5</option><option [ngValue]="8">8</option><option [ngValue]="12">12</option></select>
  </div>

  <div *ngFor="let sys of pagedSystems" class="system-card">
    <div class="system-text">{{ buildSystemText(sys) }}</div>
    <div class="actions">
      <button type="button" [class.active-edit]="sys.id === editingSystemId" (click)="editSystem(sys)">Edit</button>
      <button type="button" class="delete" (click)="openDeleteModal(sys)">Delete</button>
      <button type="button" class="solution" [class.has-solution]="sys.has_solution" [disabled]="!sys.has_solution" (click)="showSolution(sys)">Solution</button>
    </div>
  </div>

  <div *ngIf="filteredSystems.length === 0" class="empty-state">No systems found.</div>

  <div class="pagination" *ngIf="filteredSystems.length > 0">
    <button type="button" (click)="currentPage=currentPage-1" [disabled]="currentPage === 1">Previous</button>
    <span>Page {{ currentPage }} / {{ totalPages }}</span>
    <button type="button" (click)="currentPage=currentPage+1" [disabled]="currentPage === totalPages">Next</button>
  </div>
</div>

<app-confirm-delete-modal
  [isOpen]="!!pendingDeleteSystem"
  [isDeleting]="isDeleting"
  title="Delete System"
  message="Are you sure you want to delete this system?"
  (cancel)="cancelDelete()"
  (confirmDelete)="confirmDelete()">
</app-confirm-delete-modal>
