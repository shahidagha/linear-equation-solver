<section class="panel-card">
  <h3>Solution Viewer</h3>

  <app-method-selector
    [selectedMethod]="(state.selectedMethod$ | async) || 'elimination'"
    (methodSelected)="onMethodSelected($event)">
  </app-method-selector>

  <div class="verbosity-row">
    <button *ngFor="let level of verbosities" type="button" [class.active]="(state.verbosity$ | async) === level" (click)="setVerbosity(level)">
      {{ level | titlecase }}
    </button>
  </div>

  <div class="controls-row">
    <button type="button" (click)="copyQuestion()">Copy Question</button>
    <button type="button" (click)="copySolution()">Copy Solution</button>
    <ng-container *ngIf="(state.selectedMethod$ | async) === 'graphical'">
      <button type="button" (click)="viewGraph()">View Graph</button>
      <button type="button" (click)="copyGraphImage()">Copy Graph Image</button>
    </ng-container>
  </div>

  <div class="solution-value" *ngIf="state.solution$ | async as solution">
    <span *ngFor="let entry of solution | keyvalue">{{ entry.key }} = {{ entry.value }}</span>
  </div>

  <app-solution-steps
    [methods]="state.methods$ | async"
    [graph]="state.graph$ | async"
    [selectedMethod]="(state.selectedMethod$ | async) || 'elimination'"
    [verbosity]="(state.verbosity$ | async) || 'detailed'">
  </app-solution-steps>

  <button type="button" class="exit-btn" (click)="exitSolution()">Exit Solution</button>
</section>
