<section class="panel-card">
  <div class="header-row">
    <h3>Solution Viewer</h3>
    <app-method-selector
      [disabled]="!(state.methods$ | async)"
      [selectedMethod]="(state.selectedMethod$ | async) || 'elimination'"
      (methodSelected)="onMethodSelected($event)">
    </app-method-selector>
  </div>

  <div class="toolbar-row">
    <div class="verbosity-row">
      <button
        *ngFor="let level of verbosities"
        type="button"
        [disabled]="!(state.methods$ | async)"
        [class.active]="(state.verbosity$ | async) === level"
        (click)="setVerbosity(level)">
        {{ level | titlecase }}
      </button>
    </div>

    <div class="controls-row">
      <button type="button" [disabled]="!(state.methods$ | async)" (click)="copyQuestion()">Copy Question</button>
      <button type="button" [disabled]="!(state.methods$ | async)" (click)="copySolution()">Copy Solution</button>
      <ng-container *ngIf="(state.selectedMethod$ | async) === 'graphical'">
        <button type="button" [disabled]="!(state.graph$ | async)" (click)="copyGraphAsPng()">Copy graph as PNG</button>
        <button type="button" [disabled]="!(state.graph$ | async)" (click)="openGraphModal()">View graph</button>
      </ng-container>
      <button type="button" (click)="exitSolution()">Exit Solution</button>
      <span *ngIf="copySolutionMessage" class="copy-message" [class.copy-success]="copySolutionMessage === 'success'" [class.copy-failure]="copySolutionMessage === 'failure'">
        {{ copySolutionMessage === 'success' ? 'Copied to clipboard.' : 'Copy failed.' }}
      </span>
    </div>
  </div>

  <app-view-graph-modal
    [isOpen]="graphModalOpen"
    [graphData]="state.graph$ | async"
    (close)="closeGraphModal()">
  </app-view-graph-modal>

  <ng-container *ngIf="state.methods$ | async as methods; else noSolution">
    <div class="solution-value" *ngIf="state.solution$ | async as solution">
      <span *ngFor="let entry of solution | keyvalue">{{ entry.key }} = {{ entry.value }}</span>
    </div>
    <div class="solution-degenerate" *ngIf="(state.solutionType$ | async) === 'none' || (state.solutionType$ | async) === 'infinite'">
      <span class="degenerate-message">{{ state.message$ | async }}</span>
    </div>

    <app-solution-steps
      [methods]="methods"
      [graph]="state.graph$ | async"
      [selectedMethod]="(state.selectedMethod$ | async) || 'elimination'"
      [verbosity]="(state.verbosity$ | async) || 'detailed'">
    </app-solution-steps>
  </ng-container>

  <ng-template #noSolution>
    <div class="empty-solution-message">
      No solution yet. Build equations and click Solve System.
    </div>
  </ng-template>
</section>
