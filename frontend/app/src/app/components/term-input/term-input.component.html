<div class="term-frame">
  <div class="term-inner">
    <button
      type="button"
      class="sign-toggle"
      [class.negative]="term.sign === -1"
      (click)="term.sign = term.sign === 1 ? -1 : 1; updateTerm()">
      {{ term.sign === 1 ? '+' : '−' }}
    </button>

    <div class="fraction">
      <div class="fraction-row">
        <input
          type="number"
          inputmode="numeric"
          [(ngModel)]="term.numCoeff"
          (focus)="selectInputValue($event)"
          (click)="selectInputValue($event)" (mouseup)="keepSelection($event)"
          (keydown)="onNumericKeydown($event)"
          (blur)="sanitizeNumericField('numCoeff')"
          (ngModelChange)="updateTerm()">
        <span class="sqrt">√</span>
        <input
          type="number"
          inputmode="numeric"
          [(ngModel)]="term.numRad"
          (focus)="selectInputValue($event)"
          (click)="selectInputValue($event)" (mouseup)="keepSelection($event)"
          (keydown)="onNumericKeydown($event)"
          (blur)="sanitizeNumericField('numRad')"
          (ngModelChange)="updateTerm()">
      </div>
      <div class="fraction-line"></div>
      <div class="fraction-row">
        <input
          type="number"
          inputmode="numeric"
          [(ngModel)]="term.denCoeff"
          (focus)="selectInputValue($event)"
          (click)="selectInputValue($event)" (mouseup)="keepSelection($event)"
          (keydown)="onNumericKeydown($event)"
          (blur)="sanitizeNumericField('denCoeff')"
          (ngModelChange)="updateTerm()">
        <span class="sqrt">√</span>
        <input
          type="number"
          inputmode="numeric"
          [(ngModel)]="term.denRad"
          (focus)="selectInputValue($event)"
          (click)="selectInputValue($event)" (mouseup)="keepSelection($event)"
          (keydown)="onNumericKeydown($event)"
          (blur)="sanitizeNumericField('denRad')"
          (ngModelChange)="updateTerm()">
      </div>
    </div>

    <div class="variable-chip" *ngIf="variable">{{ variable }}</div>
  </div>
</div>
