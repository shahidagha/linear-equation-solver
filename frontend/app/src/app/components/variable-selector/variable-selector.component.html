<section class="variables-card">
  <h3>Variables</h3>

  <div class="variable-grid">
    <div class="variable-field">
      <label for="var1">Variable 1</label>
      <input
        id="var1"
        type="text"
        maxlength="1"
        [(ngModel)]="variable1"
        (input)="validateVariable1()">
    </div>

    <div class="variable-field">
      <label for="var2">Variable 2</label>
      <input
        id="var2"
        type="text"
        maxlength="1"
        [(ngModel)]="variable2"
        (input)="validateVariable2()">
    </div>
  </div>
</section>
