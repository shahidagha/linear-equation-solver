<div class="modal-backdrop" *ngIf="isOpen" (click)="onBackdropClick($event)">
  <section class="modal" role="dialog" aria-modal="true" aria-label="Graph" (click)="$event.stopPropagation()">
    <h3>Graph</h3>
    <div class="canvas-wrap">
      <canvas #canvasEl width="400" height="400"></canvas>
    </div>
    <div class="actions">
      <button type="button" (click)="close.emit()">Close</button>
    </div>
  </section>
</div>
