<div class="solver-container">
  <header class="solver-header">
    <h1>Linear Equation Solver</h1>
    <p>Build two equations with symbolic coefficients and solve step-by-step.</p>
  </header>

  <div class="solver-main">
    <section class="input-panel">
      <app-input-panel (solved)="onSolved($event)"></app-input-panel>
    </section>

    <section class="solution-panel">
      <app-right-panel></app-right-panel>
    </section>
  </div>
</div>
